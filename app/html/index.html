<!DOCTYPE html>
<html>
  <head>
    <title>Graph Builder</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
      <div id="main_container">
        <div id="graph_canvas">
		      <canvas id="canvas"></canvas>
        </div>
        <div id="toolbar">
          <p>Building</p>
          <div id="basic_tools">
            <button id="add_vertex" type="button">Add Vertex</button>
            <button id="new_edge" type="button">New Edge</button>
            <button id="remove" type="button">Remove</button>
            <button id="move" type="button">Move/Select</button>
          </div>
        </div>
      </div>
      
      <script src="../js/script.js"></script>
  </body>
</html>
